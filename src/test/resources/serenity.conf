webdriver {
  driver = "chrome"
  timeouts {
    implicitlywait = 0
  }
}

headless {
  chrome = true
}

serenity {
  project {
    name = "Sofkianos E2E - Listado de Kudos (Screenplay)"
  }
  test {
    root = "screenplay_pattern"
  }
  take {
    screenshots = "FOR_EACH_ACTION"
  }
  screenshots {
    strategy = "FOR_EACH_ACTION"
  }
  step {
    delay = 0
  }
}

environments {
  all {
    webdriver {
      driver = "chrome"
    }
    headless {
      chrome = true
    }
  }

  default {
    webdriver {
      base {
        url = "http://localhost:5173"
      }
    }
  }

  local {
    webdriver {
      base {
        url = "http://localhost:5173"
      }
    }
  }

  dev {
    webdriver {
      base {
        url = ${?SERENITY_DEV_BASE_URL}
      }
    }
  }

  qa {
    webdriver {
      base {
        url = ${?SERENITY_QA_BASE_URL}
      }
    }
  }
}
