serenity {
  project.name = "Sofkianos E2E - Listado de Kudos (Screenplay)"
  test.root = "screenplay_pattern"
  # Capturas en cada acción para máxima trazabilidad en el reporte
  take.screenshots = FOR_EACH_ACTION
  logging = verbose
}

webdriver {
  driver = chrome
  autodriver = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1920,1080",
        "incognito", "disable-infobars", "disable-default-apps", "disable-popup-blocking"]
    }
  }
}

# Modo headless activo por defecto.
# Para ver el navegador: ./gradlew clean test aggregate -Dheadless.mode=false
headless.mode = true

environments {
  default {
    webdriver.base.url = "http://localhost:5173"
    api.producer.base.url = "http://localhost:8082"
    api.consumer.base.url = "http://localhost:8081"
  }
  local {
    webdriver.base.url = "http://localhost:5173"
    api.producer.base.url = "http://localhost:8082"
    api.consumer.base.url = "http://localhost:8081"
  }
  dev {
    webdriver.base.url = ${?SERENITY_DEV_BASE_URL}
    api.producer.base.url = ${?SERENITY_DEV_PRODUCER_API_BASE_URL}
    api.consumer.base.url = ${?SERENITY_DEV_CONSUMER_API_BASE_URL}
  }
  qa {
    webdriver.base.url = ${?SERENITY_QA_BASE_URL}
    api.producer.base.url = ${?SERENITY_QA_PRODUCER_API_BASE_URL}
    api.consumer.base.url = ${?SERENITY_QA_CONSUMER_API_BASE_URL}
  }
}